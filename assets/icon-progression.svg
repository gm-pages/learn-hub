<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Ascending steps representing progression over time -->
  <rect x="6" y="44" width="12" height="14" rx="2" fill="#F4F0FC" stroke="#6E5898" stroke-width="2.5"/>
  <rect x="22" y="32" width="12" height="26" rx="2" fill="#F4F0FC" stroke="#6E5898" stroke-width="2.5"/>
  <rect x="38" y="20" width="12" height="38" rx="2" fill="#F4F0FC" stroke="#6E5898" stroke-width="2.5"/>
  <!-- Arrow showing progression -->
  <line x1="10" y1="14" x2="52" y2="14" stroke="#6E5898" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <polygon points="52,10 58,14 52,18" fill="#6E5898"/>
  <!-- Dots on each bar -->
  <circle cx="12" cy="48" r="2.5" fill="#6E5898"/>
  <circle cx="28" cy="38" r="2.5" fill="#6E5898"/>
  <circle cx="44" cy="26" r="2.5" fill="#6E5898"/>
</svg>