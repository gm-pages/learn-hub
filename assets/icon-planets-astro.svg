<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Planet orbits: central body with multiple orbital rings -->
  <!-- Central planet -->
  <circle cx="32" cy="32" r="7" fill="#6E5898"/>
  <!-- Inner orbit -->
  <ellipse cx="32" cy="32" rx="16" ry="10" stroke="#6E5898" stroke-width="1.8" fill="none" transform="rotate(-25 32 32)"/>
  <!-- Outer orbit -->
  <ellipse cx="32" cy="32" rx="26" ry="14" stroke="#6E5898" stroke-width="1.8" fill="none" transform="rotate(-25 32 32)"/>
  <!-- Orbiting bodies -->
  <circle cx="48" cy="24" r="3.5" fill="#6E5898"/>
  <circle cx="12" cy="44" r="2.5" fill="#6E5898"/>
  <circle cx="55" cy="38" r="2" fill="#6E5898"/>
  <!-- Small gate markers on orbits -->
  <rect x="20" y="19" width="4" height="4" rx="1" fill="#F4F0FC" stroke="#6E5898" stroke-width="1.5"/>
  <rect x="40" y="42" width="4" height="4" rx="1" fill="#F4F0FC" stroke="#6E5898" stroke-width="1.5"/>
</svg>