<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Overlapping charts: two chart wheels offset and merged -->
  <!-- Chart A (left, behind) -->
  <circle cx="24" cy="28" r="20" stroke="#6E5898" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="24" cy="28" r="12" stroke="#6E5898" stroke-width="1.5" fill="#F4F0FC" opacity="0.5"/>
  <!-- Chart B (right, front) -->
  <circle cx="40" cy="36" r="20" stroke="#6E5898" stroke-width="2.5" fill="none"/>
  <circle cx="40" cy="36" r="12" stroke="#6E5898" stroke-width="1.5" fill="#F4F0FC"/>
  <!-- Overlap zone emphasis: nodes in the intersection -->
  <circle cx="32" cy="32" r="3.5" fill="#6E5898"/>
  <circle cx="30" cy="26" r="2" fill="#6E5898"/>
  <circle cx="36" cy="38" r="2" fill="#6E5898"/>
  <!-- Chart marks -->
  <line x1="40" y1="16" x2="40" y2="20" stroke="#6E5898" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="36" x2="52" y2="36" stroke="#6E5898" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="56" x2="40" y2="52" stroke="#6E5898" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="28" y2="36" stroke="#6E5898" stroke-width="1.5" stroke-linecap="round"/>
</svg>