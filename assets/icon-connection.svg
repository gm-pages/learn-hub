<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Two bodygraphs overlapping representing connection chart -->
  <rect x="6" y="12" width="24" height="32" rx="4" fill="#F4F0FC" stroke="#6E5898" stroke-width="2.5"/>
  <rect x="34" y="20" width="24" height="32" rx="4" fill="#F4F0FC" stroke="#6E5898" stroke-width="2.5"/>
  <!-- Connecting lines between them -->
  <line x1="30" y1="28" x2="34" y2="32" stroke="#6E5898" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="36" x2="34" y2="40" stroke="#6E5898" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dots in each -->
  <circle cx="18" cy="24" r="3" fill="#6E5898"/>
  <circle cx="18" cy="36" r="3" fill="#6E5898"/>
  <circle cx="46" cy="32" r="3" fill="#6E5898"/>
  <circle cx="46" cy="44" r="3" fill="#6E5898"/>
</svg>