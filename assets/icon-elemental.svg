<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Four-part elemental motif: fire, earth, air, water -->
  <!-- Dividing cross -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#6E5898" stroke-width="1.5"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#6E5898" stroke-width="1.5"/>
  <!-- Fire (top-left): upward triangle -->
  <path d="M17 28 L22 14 L27 28 Z" stroke="#6E5898" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Water (top-right): downward triangle -->
  <path d="M37 14 L42 28 L47 14 Z" stroke="#6E5898" stroke-width="2" fill="#F4F0FC" stroke-linejoin="round"/>
  <!-- Air (bottom-left): upward triangle with bar -->
  <path d="M17 50 L22 36 L27 50 Z" stroke="#6E5898" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <line x1="18.5" y1="44" x2="25.5" y2="44" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <!-- Earth (bottom-right): downward triangle with bar -->
  <path d="M37 36 L42 50 L47 36 Z" stroke="#6E5898" stroke-width="2" fill="#F4F0FC" stroke-linejoin="round"/>
  <line x1="38.5" y1="42" x2="45.5" y2="42" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="27" stroke="#6E5898" stroke-width="2" fill="none"/>
</svg>