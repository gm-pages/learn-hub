<svg xmlns="http://www.w3.org/2000/svg" width="92" height="92" viewBox="6 6 80 80">
  <!-- Large central star (4-point) — gentle pulse -->
  <path d="M46,18 L50,39 L70,44 L50,49 L46,70 L42,49 L22,44 L42,39 Z" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Small stars — staggered twinkle -->
  <path d="M20,20 L22,26 L28,28 L22,30 L20,36 L18,30 L12,28 L18,26 Z" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
  </path>
  <path d="M72,22 L74,27 L79,29 L74,31 L72,36 L70,31 L65,29 L70,27 Z" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </path>
  <path d="M24,64 L26,68 L30,70 L26,72 L24,76 L22,72 L18,70 L22,68 Z" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M70,62 L72,66 L76,68 L72,70 L70,74 L68,70 L64,68 L68,66 Z" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <!-- Tiny dots — faster twinkle -->
  <circle cx="34" cy="26" r="2" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="56" r="2" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.3s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="18" r="1.5" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.7s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="54" r="1.5" fill="#6d5797">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.4s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
</svg>
