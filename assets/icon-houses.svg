<svg xmlns="http://www.w3.org/2000/svg" width="92" height="92" viewBox="0 0 92 92">
  <circle cx="46" cy="46" r="44" fill="#ebeef6"/>
  <!-- Wheel divided into 12 houses -->
  <circle cx="46" cy="46" r="32" fill="none" stroke="#6d5797" stroke-width="2.5"/>
  <circle cx="46" cy="46" r="20" fill="none" stroke="#6d5797" stroke-width="1.5"/>
  <!-- House division lines -->
  <line x1="46" y1="14" x2="46" y2="26" stroke="#6d5797" stroke-width="1.5"/>
  <line x1="46" y1="66" x2="46" y2="78" stroke="#6d5797" stroke-width="1.5"/>
  <line x1="14" y1="46" x2="26" y2="46" stroke="#6d5797" stroke-width="1.5"/>
  <line x1="66" y1="46" x2="78" y2="46" stroke="#6d5797" stroke-width="1.5"/>
  <!-- Diagonal lines -->
  <line x1="23.4" y1="23.4" x2="31.7" y2="31.7" stroke="#6d5797" stroke-width="1.5"/>
  <line x1="60.3" y1="60.3" x2="68.6" y2="68.6" stroke="#6d5797" stroke-width="1.5"/>
  <line x1="68.6" y1="23.4" x2="60.3" y2="31.7" stroke="#6d5797" stroke-width="1.5"/>
  <line x1="31.7" y1="60.3" x2="23.4" y2="68.6" stroke="#6d5797" stroke-width="1.5"/>
  <!-- AC-DC axis bold -->
  <line x1="14" y1="46" x2="78" y2="46" stroke="#6d5797" stroke-width="3"/>
  <!-- MC-IC axis bold -->
  <line x1="46" y1="14" x2="46" y2="78" stroke="#6d5797" stroke-width="3"/>
  <!-- House numbers -->
  <text x="52" y="56" font-size="9" fill="#6d5797" font-family="Arial" font-weight="bold">1</text>
  <text x="35" y="42" font-size="9" fill="#6d5797" font-family="Arial" font-weight="bold">7</text>
</svg>
