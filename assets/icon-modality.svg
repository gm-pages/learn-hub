<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Triangular cyclical pattern: three modalities in cycle -->
  <!-- Outer triangle (the cycle) -->
  <path d="M32 8 L56 50 L8 50 Z" stroke="#6E5898" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <!-- Inner triangle (inverted) -->
  <path d="M32 50 L44 29 L20 29 Z" stroke="#6E5898" stroke-width="1.5" fill="#F4F0FC" stroke-linejoin="round"/>
  <!-- Modality nodes at vertices -->
  <circle cx="32" cy="8" r="4.5" fill="#6E5898"/>
  <circle cx="56" cy="50" r="4.5" fill="#6E5898"/>
  <circle cx="8" cy="50" r="4.5" fill="#6E5898"/>
  <!-- Cycle arrows on edges (small triangular markers) -->
  <path d="M46 27 L44 31 L42 27" fill="#6E5898"/>
  <path d="M18 27 L20 31 L22 27" fill="#6E5898"/>
  <path d="M30 52 L32 48 L34 52" fill="#6E5898"/>
</svg>