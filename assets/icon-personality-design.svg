<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Split duality: mirrored halves, Personality (left) / Design (right) -->
  <!-- Dividing line -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#6E5898" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Left half: Personality (conscious) - outlined shapes -->
  <circle cx="18" cy="16" r="6" stroke="#6E5898" stroke-width="2.5" fill="none"/>
  <rect x="10" y="28" width="16" height="10" rx="3" stroke="#6E5898" stroke-width="2.5" fill="none"/>
  <circle cx="18" cy="50" r="6" stroke="#6E5898" stroke-width="2.5" fill="none"/>
  <!-- Right half: Design (unconscious) - filled shapes -->
  <circle cx="46" cy="16" r="6" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <rect x="38" y="28" width="16" height="10" rx="3" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="46" cy="50" r="6" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <!-- Filled dots in right shapes -->
  <circle cx="46" cy="16" r="2.5" fill="#6E5898"/>
  <circle cx="46" cy="33" r="2.5" fill="#6E5898"/>
  <circle cx="46" cy="50" r="2.5" fill="#6E5898"/>
</svg>