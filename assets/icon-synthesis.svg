<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Interlocking systems / layered network -->
  <!-- System A: circle network (top-left) -->
  <circle cx="20" cy="18" r="12" stroke="#6E5898" stroke-width="2" fill="none"/>
  <!-- System B: circle network (top-right) -->
  <circle cx="44" cy="18" r="12" stroke="#6E5898" stroke-width="2" fill="none"/>
  <!-- System C: circle network (bottom-center) -->
  <circle cx="32" cy="42" r="12" stroke="#6E5898" stroke-width="2" fill="none"/>
  <!-- Intersection fill areas -->
  <circle cx="32" cy="14" r="3" fill="#F4F0FC" stroke="#6E5898" stroke-width="1.5"/>
  <circle cx="24" cy="32" r="3" fill="#F4F0FC" stroke="#6E5898" stroke-width="1.5"/>
  <circle cx="40" cy="32" r="3" fill="#F4F0FC" stroke="#6E5898" stroke-width="1.5"/>
  <!-- Central synthesis point (all three overlap) -->
  <circle cx="32" cy="26" r="4" fill="#6E5898"/>
  <!-- Network nodes -->
  <circle cx="14" cy="10" r="2.5" fill="#6E5898"/>
  <circle cx="50" cy="10" r="2.5" fill="#6E5898"/>
  <circle cx="32" cy="52" r="2.5" fill="#6E5898"/>
  <!-- Connecting lines through center -->
  <line x1="14" y1="10" x2="32" y2="26" stroke="#6E5898" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="10" x2="32" y2="26" stroke="#6E5898" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="26" stroke="#6E5898" stroke-width="1.5" stroke-linecap="round"/>
</svg>