<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Incarnation Cross: four arms radiating from center -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#6E5898" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="58" y2="32" stroke="#6E5898" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center circle -->
  <circle cx="32" cy="32" r="6" fill="#F4F0FC" stroke="#6E5898" stroke-width="2.5"/>
  <!-- Gate markers at four ends -->
  <circle cx="32" cy="10" r="4" fill="#F4F0FC" stroke="#6E5898" stroke-width="2"/>
  <circle cx="32" cy="54" r="4" fill="#F4F0FC" stroke="#6E5898" stroke-width="2"/>
  <circle cx="10" cy="32" r="4" fill="#F4F0FC" stroke="#6E5898" stroke-width="2"/>
  <circle cx="54" cy="32" r="4" fill="#F4F0FC" stroke="#6E5898" stroke-width="2"/>
  <!-- Inner dot -->
  <circle cx="32" cy="32" r="2" fill="#6E5898"/>
</svg>