<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Chain links / branching hierarchy -->
  <!-- Top node (ruler) -->
  <circle cx="32" cy="10" r="6" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="32" cy="10" r="2.5" fill="#6E5898"/>
  <!-- Branching lines down -->
  <line x1="32" y1="16" x2="16" y2="30" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="16" x2="48" y2="30" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <!-- Second tier nodes -->
  <circle cx="16" cy="32" r="5" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="16" cy="32" r="2" fill="#6E5898"/>
  <circle cx="48" cy="32" r="5" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="48" cy="32" r="2" fill="#6E5898"/>
  <!-- Third tier branches -->
  <line x1="16" y1="37" x2="10" y2="48" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="37" x2="24" y2="48" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="37" x2="42" y2="48" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="37" x2="56" y2="48" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <!-- Third tier nodes -->
  <circle cx="10" cy="50" r="4" stroke="#6E5898" stroke-width="2" fill="#F4F0FC"/>
  <circle cx="24" cy="50" r="4" stroke="#6E5898" stroke-width="2" fill="#F4F0FC"/>
  <circle cx="42" cy="50" r="4" stroke="#6E5898" stroke-width="2" fill="#F4F0FC"/>
  <circle cx="56" cy="50" r="4" stroke="#6E5898" stroke-width="2" fill="#F4F0FC"/>
  <!-- Chain link connectors (small ovals on lines) -->
  <ellipse cx="24" cy="23" rx="3" ry="2" stroke="#6E5898" stroke-width="1.5" fill="white" transform="rotate(-40 24 23)"/>
  <ellipse cx="40" cy="23" rx="3" ry="2" stroke="#6E5898" stroke-width="1.5" fill="white" transform="rotate(40 40 23)"/>
</svg>