<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Connected nodes with aspect lines: linked geometry -->
  <!-- Nodes (centers/planets) -->
  <circle cx="32" cy="8" r="5" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="10" cy="28" r="5" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="54" cy="28" r="5" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="16" cy="52" r="5" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <circle cx="48" cy="52" r="5" stroke="#6E5898" stroke-width="2.5" fill="#F4F0FC"/>
  <!-- Aspect/channel connecting lines -->
  <line x1="28" y1="12" x2="14" y2="24" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="12" x2="50" y2="24" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="33" x2="16" y2="47" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="33" x2="48" y2="47" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="52" x2="43" y2="52" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <!-- Cross aspect line -->
  <line x1="14" y1="26" x2="50" y2="26" stroke="#6E5898" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <!-- Center dots -->
  <circle cx="32" cy="8" r="2" fill="#6E5898"/>
  <circle cx="10" cy="28" r="2" fill="#6E5898"/>
  <circle cx="54" cy="28" r="2" fill="#6E5898"/>
  <circle cx="16" cy="52" r="2" fill="#6E5898"/>
  <circle cx="48" cy="52" r="2" fill="#6E5898"/>
</svg>