<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Balanced scales with plus/minus planetary feel -->
  <!-- Scale beam -->
  <line x1="12" y1="28" x2="52" y2="28" stroke="#6E5898" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fulcrum triangle -->
  <path d="M28 28 L32 20 L36 28" stroke="#6E5898" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <!-- Fulcrum pillar -->
  <line x1="32" y1="20" x2="32" y2="12" stroke="#6E5898" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="10" r="3" fill="#6E5898"/>
  <!-- Left pan (dignity/exaltation - raised) -->
  <path d="M8 28 L8 36 Q16 42 24 36 L24 28" stroke="#6E5898" stroke-width="2" fill="#F4F0FC"/>
  <!-- Plus sign in left pan -->
  <line x1="13" y1="33" x2="19" y2="33" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="30" x2="16" y2="36" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <!-- Right pan (detriment/fall - lowered) -->
  <path d="M40 28 L40 36 Q48 42 56 36 L56 28" stroke="#6E5898" stroke-width="2" fill="#F4F0FC"/>
  <!-- Minus sign in right pan -->
  <line x1="45" y1="33" x2="51" y2="33" stroke="#6E5898" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="24" y1="56" x2="40" y2="56" stroke="#6E5898" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="28" x2="32" y2="56" stroke="#6E5898" stroke-width="2"/>
</svg>