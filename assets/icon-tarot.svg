<svg xmlns="http://www.w3.org/2000/svg" width="92" height="92" viewBox="6 6 80 80">
  <!-- Tarot card (back card) -->
  <rect x="22" y="16" width="32" height="48" rx="3" fill="none" stroke="#6d5797" stroke-width="1.8" transform="rotate(-8 38 40)"/>
  <!-- Tarot card (front card) -->
  <rect x="32" y="16" width="32" height="48" rx="3" fill="#fff" stroke="#6d5797" stroke-width="2.5"/>
  <!-- Star on card -->
  <path d="M48,28 L50.5,36 L59,36 L52.5,41 L55,49 L48,44 L41,49 L43.5,41 L37,36 L45.5,36 Z" fill="#6d5797"/>
  <!-- Card border decoration -->
  <rect x="36" y="20" width="24" height="40" rx="1.5" fill="none" stroke="#6d5797" stroke-width="1"/>
  <!-- Bottom detail lines -->
  <line x1="40" y1="56" x2="56" y2="56" stroke="#6d5797" stroke-width="1"/>
  <line x1="42" y1="59" x2="54" y2="59" stroke="#6d5797" stroke-width="1"/>
</svg>
